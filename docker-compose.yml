services:
  postgres:
    image: postgres:17
    container_name: neuroblog-db
    environment:
      POSTGRES_DB: neuroblog
      POSTGRES_USER: neuroblog
      POSTGRES_PASSWORD: neuroblog
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neuroblog -d neuroblog"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Exposed on host port 5433 (to avoid clashing with a local Postgres on 5432).
    # Only for convenience / local `dotnet run`; the app container talks to
    # Postgres over the internal Docker network, not this mapping.
    ports:
      - "5433:5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neuroblog-app
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=neuroblog;Username=neuroblog;Password=neuroblog"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
